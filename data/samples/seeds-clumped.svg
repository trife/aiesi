<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#d8d3c4"/>

  <!-- soft shadows under a few seeds, offset — these trip up naive thresholding -->
  <g fill="#00000030">
    <ellipse cx="168" cy="168" rx="30" ry="14"/>
    <ellipse cx="438" cy="248" rx="32" ry="15"/>
    <ellipse cx="618" cy="428" rx="30" ry="14"/>
    <ellipse cx="248" cy="448" rx="30" ry="14"/>
  </g>

  <!-- evenly spaced, easy-to-count seeds -->
  <g fill="#3b2a1a">
    <circle cx="160" cy="160" r="22"/>
    <circle cx="430" cy="240" r="22"/>
    <circle cx="610" cy="420" r="22"/>
    <circle cx="240" cy="440" r="22"/>
    <circle cx="120" cy="320" r="21"/>
    <circle cx="330" cy="120" r="22"/>
    <circle cx="540" cy="150" r="21"/>
    <circle cx="700" cy="260" r="22"/>
    <circle cx="700" cy="500" r="21"/>
    <circle cx="360" cy="520" r="22"/>
    <circle cx="80" cy="490" r="21"/>
    <circle cx="520" cy="400" r="22"/>
  </g>

  <!-- a clumped cluster of touching/overlapping seeds — hard to count by threshold+contour alone -->
  <g fill="#3b2a1a">
    <circle cx="590" cy="120" r="23"/>
    <circle cx="622" cy="132" r="22"/>
    <circle cx="605" cy="158" r="23"/>
    <circle cx="638" cy="160" r="21"/>
    <circle cx="612" cy="100" r="20"/>
  </g>

  <!-- two seeds touching, plus one half off the edge -->
  <g fill="#3b2a1a">
    <circle cx="200" cy="560" r="22"/>
    <circle cx="234" cy="566" r="21"/>
    <circle cx="10" cy="230" r="22"/>
  </g>
</svg>
