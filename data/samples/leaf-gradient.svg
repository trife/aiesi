<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="leafHealth" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2e7d32"/>
      <stop offset="55%" stop-color="#8a9a3a"/>
      <stop offset="80%" stop-color="#b98a2e"/>
      <stop offset="100%" stop-color="#8a5a24"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="#eef1e8"/>

  <!-- leaf body: almond shape via a path -->
  <path d="M 100 300
           C 100 150, 300 60, 700 40
           C 620 220, 620 380, 700 560
           C 300 540, 100 450, 100 300 Z"
        fill="url(#leafHealth)" stroke="#1f4a22" stroke-width="4"/>

  <!-- center vein -->
  <path d="M 130 300 C 300 300, 550 300, 690 300" stroke="#1f4a22" stroke-width="3" fill="none" opacity="0.5"/>

  <!-- disease spots concentrated on the diseased (right) side -->
  <g fill="#5a3a18" opacity="0.75">
    <ellipse cx="560" cy="220" rx="18" ry="14"/>
    <ellipse cx="610" cy="300" rx="22" ry="16"/>
    <ellipse cx="580" cy="390" rx="16" ry="13"/>
    <ellipse cx="650" cy="160" rx="14" ry="11"/>
    <ellipse cx="640" cy="440" rx="17" ry="13"/>
  </g>

  <!-- a couple of small spots even on the "healthy" side, for realism -->
  <g fill="#5a3a18" opacity="0.4">
    <ellipse cx="230" cy="260" rx="10" ry="8"/>
    <ellipse cx="280" cy="380" rx="9" ry="7"/>
  </g>
</svg>
